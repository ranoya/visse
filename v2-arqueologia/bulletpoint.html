    <script type="module">
      import {
        Runtime,
        Inspector,
      } from "https://cdn.jsdelivr.net/npm/@observablehq/runtime@4/dist/runtime.js";
      import define from "https://api.observablehq.com/@ranoya/dashboard-artigobulletpoints.js?v=3";
      new Runtime().module(define, (name) => {
        if (name === "viewof filtros")
          return new Inspector(document.querySelector("#filtros"));
        if (name === "botoes")
          return new Inspector(document.querySelector("#criterios"));

        if (name === "apresenta")
          return new Inspector(document.querySelector("#artefatos"));

        if (name === "stats")
          return new Inspector(document.querySelector("#estatisticas"));

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Nuosu+SIL&family=Open+Sans:wght@300;400;700&family=Prompt:wght@100;300;600&display=swap");

      :root {
        --cor-bg: transparent;
        --cor-fcolor: #aaaaaa;
      }

      ::-webkit-scrollbar {
        width: 12px;
        background-color: transparent;
      }

      ::-webkit-scrollbar-thumb {
        width: 12px;
        background: var(--cor-fcolor, #aaaaaa);
      }

      html {
        background-color: var(--cor-bg, transparent);
      }
      body {
        margin: 40px;
        margin-right: 60px;
        margin-bottom: 80px;
        font-family: "Open Sans", sans-serif;
        background-color: var(--cor-bg, transparent);
      }

      #coverplate {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100dvh;
        z-index: 10;

        background-color: var(--cor-bg, #ffffff);
        opacity: 0.9;
      }

      #objeto {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100dvh;
        z-index: 11;
        align-content: center;
        justify-content: center;
        align-items: center;
      }

      #objeto div {
        position: relative;
        z-index: 15;
      }

      #filtros {
        max-width: 420px;
        float: left;
      }

      #criterios {
        clear: both;
      }

      #estatisticas {
        width: calc(100% - 480px);
        float: right;
        height: 51px;
        display: flex;
        align-items: center;
        color: var(--cor-fcolor, #aaaaaa);
        justify-content: flex-end;
        text-align: right;
      }

      #filtros input {
        border-bottom: 1px dashed #ffffffff;
        width: 500px;
        font-size: 16px;
        margin-bottom: 10px;
        line-height: 32px;
        padding: 4px;
        padding-left: 12px;
        padding-right: 12px;
      }

      #filtros input:focus {
        border-bottom: 1px dotted #ffffffff;
        outline: transparent;
      }

      * {
        padding: 0;
        margin: 0;
        border: 0;
        text-decoration: none;
        transition: all 0.2s ease-in;
        color: #555555;
      }

      .custombutton {
        display: inline-block;
        font-size: 16px;
        line-height: 26px;
        height: 26px;
        border: 3px solid #ffffff00;
        padding-left: 10px;
        padding-right: 10px;
        background-color: #ffffff44;
        cursor: pointer;
        margin-right: 6px;
        color: #555555;
        font-weight: lighter;
        margin-top: 4px;
        padding-top: 3px;
        padding-bottom: 3px;
        font-family: "Open Sans";
      }

      .custombutton:hover {
        background-color: #ffffffff;
        border: 3px solid #ffffffff;
      }

      .singlepost {
        padding: 12px 12px 12px 12px;
        margin: -12px -12px -12px -12px;
        color: #555555;
        box-shadow: 0px 5px 20px #00000033;
        background-color: #ffffffaa;
      }

      .singlepost:hover {
        background-color: #ffffffff;
        color: #555555;
      }

      #botoes {
        display: grid;
        grid-template-columns: 1fr 40%;
        gap: 0 8px;
      }

      .buttonspecial {
        background-color: #ffffff88;
        border: 3px solid #ffffff00;
      }

      .buttonspecial:hover {
        background-color: #ffffffff;
        border: 3px solid #ffffffff;
      }

      .subcustombutton {
        display: inline-block;
        font-size: 16px;
        line-height: 26px;
        height: 26px;
        border: 3px solid #ffffff00;
        padding-left: 10px;
        padding-right: 10px;

        color: #555555;
        font-weight: lighter;

        padding-top: 3px;
        padding-bottom: 3px;
        font-family: "Open Sans";
      }

      .subcustombutton:hover {
        background-color: #ffffffff;
        border: 3px solid #ffffffff;
      }

      .stage {
        width: calc(80% - 40px);
        height: calc(65% - 70px);
        background-color: var(--cor-fcolor, white);
        padding: 20px;
        box-shadow: 5px 5px 8px #000000;
        display: flex;
      }

    <script>
      // FUNÇÃO URL GET
      // urlGet('xpto'); www.site.com/?xpto=teste
      // let data = $_GET['xpto']; www.site.com/?xpto=teste

      $_GET = [];
      (function () {
        corte = window.location.href.toString().indexOf("?");
        if (corte > 0) {
          argumento = window.location.href.toString().substring(corte + 1);
          argumentos = argumento.split("&");
          for (arg in argumentos) {
            let argCorte = argumentos[arg].indexOf("=");
            $_GET[argumentos[arg].substring(0, argCorte)] = argumentos[
              arg
            ].substring(argCorte + 1);
          }
        }
      })();

      if (
        $_GET["filtra"] != "" &&
        typeof $_GET["filtra"] != "undefined" &&
        $_GET["filtra"] != null
      ) {
        temporiza = setInterval(function () {
          if (typeof document.getElementsByTagName("input")[1] != "undefined") {
            document.getElementsByTagName("input")[1].value =
              " " + decodeURI($_GET["filtra"]);
            document.getElementsByTagName("input")[1].dispatchEvent(
              new Event("input", {
                bubbles: true,
              }),
            );

            clearInterval(temporiza);
          }
        }, 100);
      }

      if (
        typeof $_GET["bg"] != "undefined" &&
        $_GET["bg"] != null &&
        $_GET["bg"] != ""
      ) {
        document.body.style.setProperty("--cor-bg", "#" + $_GET["bg"]);
      }

      if (
        typeof $_GET["fg"] != "undefined" &&
        $_GET["fg"] != null &&
        $_GET["fg"] != ""
      ) {
        document.documentElement.style.setProperty(
          "--cor-fcolor",
          "#" + $_GET["fg"],
        );
      }

      const goto = function (el) {
        setTimeout(function () {
          window.scrollTo({
            top: document.getElementById(el).offsetTop - 25,
            behavior: "smooth",
          });
        }, 400);
      };

      if (
        typeof $_GET["goto"] != "undefined" &&
        $_GET["goto"] != null &&
        $_GET["goto"] != ""
      ) {
        goto($_GET["goto"]);
      }

      let unshow = function () {
        document.getElementById("coverplate").style.display = "none";
        document.getElementById("objeto").style.display = "none";
        document.getElementById("objeto").innerHTML = "";
      };

      let show = function (file, emu) {
        document.getElementById("coverplate").style.display = "block";
        document.getElementById("objeto").style.display = "flex";

        let blocoemu = "";
        if (typeof emu != "undefined" && emu != null && emu != "") {
          blocoemu = `
          
          <a class="botaoemulador" style="width: 60px; height: 60px; margin-left: 20px;" target="_blank" href="${emu}">
                <svg style="width: 60px; aspect-ratio: 1/1;" viewBox="0 0 1566 1566" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="1566" height="1566" fill="var(--cor-bg, #000000)"></rect>
                <path d="M456 968V718H506V668H556V618H706V668H756V718H806V968H706V868H556V968H456ZM556 818H706V718H656V668H606V718H556V818Z" fill="var(--cor-fcolor, #aaaaaa)"></path>
                <path d="M906 968V918H956V868H1006V818H1056V768H1006V718H956V668H906V618H1006V668H1056V718H1106V768H1156V818H1106V868H1056V918H1006V968H906Z" fill="var(--cor-fcolor, #aaaaaa)"></path>
                </svg>
            </a>
          
          
          `;
        }

        if (file.match(/yout/) != null) {
          document.getElementById("objeto").innerHTML =
            `<div class="stage"><iframe src="${file}" frameborder= "0" style="width: 100%; height: 90dvh; border: none;" allowfullscreen></iframe>${blocoemu}</div>`;
        } else {
          document.getElementById("objeto").innerHTML =
            '<div class="stage"><img src="' +
            imagefromallsources(file) +
            '" style="max-width: 100%; max-height: 90dvh; object-fit: contain;" />' +
            blocoemu +
            "</div>";
        }
      };
    </script>
